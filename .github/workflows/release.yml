# Release workflow — builds, signs, notarises, staples, and publishes a .dmg GitHub Release.
#
# Triggers automatically on version tags (v*.*.*) and supports manual runs.
#
# Required secrets (repo Settings → Secrets → Actions):
#   APPLE_CERTIFICATE          — base64-encoded Developer ID Application .p12 cert
#   APPLE_CERTIFICATE_PASSWORD — .p12 export password
#   APPLE_SIGNING_IDENTITY     — e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                   — Apple ID email used for notarisation
#   APPLE_PASSWORD             — app-specific password for APPLE_ID
#   APPLE_TEAM_ID              — 10-character Apple Developer Team ID
#   TAURI_SIGNING_PRIVATE_KEY          — base64-encoded private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — password used during key generation

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to release (e.g. v1.0.2). Creates a draft release.'
        required: false
        default: 'v0.0.0-manual'

jobs:
  release:
    name: Build & Release (macOS)
    runs-on: macos-latest
    permissions:
      contents: write

    env:
      TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install Bun (required for apple-mcp)
        run: brew install oven-sh/bun/bun

      - name: Install frontend deps
        run: npm ci

      - name: Build app (sign + notarise via Tauri)
        env:
          CARGO_INCREMENTAL: "0"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri:build

      - name: Staple notarisation ticket to DMG
        run: |
          DMG=$(find target/release/bundle/dmg -name "*.dmg" | head -1)
          echo "Stapling: $DMG"
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(find target/release/bundle/dmg -name "*.dmg" | head -1)
          DMG_NAME=$(basename "$DMG")

          NOTES=$(cat <<NOTES
          ## openMOON ${{ env.TAG }}

          ### Installation
          1. Download \`${DMG_NAME}\` below.
          2. Open the .dmg, drag **openMOON.app** to \`/Applications\`.
          3. Launch openMOON and set your OpenAI API key in Settings.

          > This build is signed and notarised by Apple — no extra steps needed.
          NOTES
          )

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            gh release create "${{ env.TAG }}" --draft --title "openMOON ${{ env.TAG }}" --notes "$NOTES" "$DMG"
          else
            gh release create "${{ env.TAG }}" --title "openMOON ${{ env.TAG }}" --notes "$NOTES" "$DMG"
          fi
